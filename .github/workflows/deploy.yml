name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      # If this is plain HTML/CSS/JS, keep this:
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      # If this is Vite/React/etc., replace the upload step with:
      # - uses: actions/setup-node@v4
      #   with:
      #     node-version: 20
      #     cache: npm
      # - run: npm ci
      # - run: npm run build
      # - uses: actions/upload-pages-artifact@v3
      #   with:
      #     path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
